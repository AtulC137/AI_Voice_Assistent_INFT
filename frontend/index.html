<!DOCTYPE html>
<html>

<head>
<title>AI Voice Assistant</title>
</head>

<body>

<h1>AI Voice Assistant</h1>

<button id="recordBtn">
Start Conversation
</button>

<script>

let ws=null;

let audioContext=null;
let mediaStream=null;
let source=null;
let workletNode=null;

let initialized=false;
let recording=false;

let speechStarted=false;
let silenceTimer=null;

let bufferedChunks=[];

let isAIPlaying=false;


/* less sensitive */

const SILENCE_THRESHOLD=0.03;

const SILENCE_DURATION=700;

const MIN_AUDIO_CHUNKS=8;



function connectSocket(){

ws=new WebSocket(
"ws://localhost:8000/ws"
);

ws.binaryType="arraybuffer";


ws.onopen=()=>{

console.log(
"[WS] Connected"
);

};


ws.onmessage=(event)=>{


console.log(
"[AI AUDIO RECEIVED]"
);


isAIPlaying=true;


const blob=new Blob(
[event.data],
{
type:"audio/mp3"
}
);


const url=
URL.createObjectURL(
blob
);


const audio=
new Audio(
url
);


audio.onended=()=>{

console.log(
"[AI FINISHED]"
);

isAIPlaying=false;

};


audio.play();

};


ws.onclose=()=>{

console.log(
"[WS] Closed"
);

recording=false;

};


}



async function initializeAudio(){

if(initialized){

return;

}


mediaStream=

await navigator
.mediaDevices
.getUserMedia({

audio:true

});


audioContext=

new AudioContext({

sampleRate:16000

});


await audioContext
.audioWorklet
.addModule(

"/audio-processor.js"

);


initialized=true;

}



function sendBufferedAudio(){


if(

bufferedChunks.length
<
MIN_AUDIO_CHUNKS

){

bufferedChunks=[];

speechStarted=false;

return;

}



console.log(
"[SENDING AUDIO]"
);


let totalLength=0;


bufferedChunks.forEach(

chunk=>{

totalLength+=chunk.length;

}

);


let merged=

new Int16Array(
totalLength
);


let offset=0;


bufferedChunks.forEach(

chunk=>{

merged.set(
chunk,
offset
);

offset+=
chunk.length;

}

);


if(

ws &&

ws.readyState===1

){

ws.send(
merged.buffer
);


ws.send(

JSON.stringify({

type:"stop"

})

);

}


bufferedChunks=[];

speechStarted=false;

silenceTimer=null;

}



document
.getElementById(
"recordBtn"
)
.onclick=async()=>{


if(recording){

return;

}


recording=true;


document
.getElementById(
"recordBtn"
)
.innerText=

"Listening";


connectSocket();


await initializeAudio();


source=

audioContext
.createMediaStreamSource(
mediaStream
);


workletNode=

new AudioWorkletNode(

audioContext,

"audio-processor"

);



workletNode
.port
.onmessage=(event)=>{


if(

!recording ||

isAIPlaying

){

return;

}


const samples=

event.data;


let sum=0;


for(

let i=0;

i<samples.length;

i++

){

sum+=

samples[i]
*
samples[i];

}


let rms=

Math.sqrt(

sum/

samples.length

);



if(

rms>

SILENCE_THRESHOLD

){

speechStarted=true;


if(

silenceTimer

){

clearTimeout(

silenceTimer

);

silenceTimer=null;

}


let pcmData=

new Int16Array(

samples.length

);


for(

let i=0;

i<samples.length;

i++

){

let s=

Math.max(

-1,

Math.min(

1,

samples[i]

)

);


pcmData[i]=

s<0

?

s*32768

:

s*32767;

}


bufferedChunks.push(

pcmData

);

}


else{


if(

speechStarted &&

!silenceTimer

){

silenceTimer=

setTimeout(

()=>{

console.log(
"[PAUSE DETECTED]"
);

sendBufferedAudio();

},

SILENCE_DURATION

);

}

}


};


const silentNode=
audioContext.createGain();

silentNode.gain.value=0;

source.connect(
workletNode
);

workletNode.connect(
silentNode
);

silentNode.connect(
audioContext.destination
);

};

</script>

</body>

</html>
