<!DOCTYPE html>
<html>

<head>
    <title>AI Voice Assistant</title>
</head>

<body>

<h1>AI Voice Assistant</h1>

<button id="recordBtn">
Start Recording
</button>

<script>

let ws=null;

let audioContext=null;
let mediaStream=null;
let source=null;
let workletNode=null;

let initialized=false;
let recording=false;



function connectSocket(){

    ws=new WebSocket(
        "ws://localhost:8000/ws"
    );

    ws.binaryType="arraybuffer";


    ws.onopen=()=>{

        console.log(
            "Connected"
        );

    };


    ws.onmessage=(event)=>{

        console.log(
            "[SERVER]",
            event.data
        );

    };


    ws.onclose=()=>{

        console.log(
            "Disconnected"
        );

    };

}



async function initializeAudio(){

    if(initialized){

        return;
    }


    mediaStream=

    await navigator
    .mediaDevices
    .getUserMedia({

        audio:true

    });


    audioContext=

    new AudioContext({

        sampleRate:16000

    });


    await audioContext
    .audioWorklet
    .addModule(

        "/audio-processor.js"

    );


    initialized=true;

}



document
.getElementById(
"recordBtn"
)
.onclick=async()=>{


if(!recording){

recording=true;


connectSocket();


document
.getElementById(
"recordBtn"
)
.innerText=

"Stop Recording";


await initializeAudio();


source=

audioContext
.createMediaStreamSource(

mediaStream

);


workletNode=

new AudioWorkletNode(

audioContext,

"audio-processor"

);


workletNode.port.onmessage=(event)=>{


if(!recording){

return;

}


let samples=

event.data;


let pcmData=

new Int16Array(

samples.length

);


for(

let i=0;
i<samples.length;
i++

){

let s=

Math.max(
-1,
Math.min(
1,
samples[i]
)
);


pcmData[i]=

s<0

?

s*32768

:

s*32767;

}


if(

ws &&

ws.readyState===1

){

ws.send(

pcmData.buffer

);

}

};


source.connect(
workletNode
);

workletNode.connect(
audioContext.destination
);

}


else{


recording=false;


document
.getElementById(
"recordBtn"
)
.innerText=

"Start Recording";


console.log(
"Stopping recording..."
);


workletNode.disconnect();

source.disconnect();


ws.send(

JSON.stringify({

type:"stop"

})

);

}

};

</script>

</body>

</html>
