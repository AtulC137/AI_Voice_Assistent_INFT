<!DOCTYPE html>
<html>

<head>
    <title>AI Voice Assistant</title>
</head>

<body>

<h1>AI Voice Assistant</h1>

<button id="startBtn">
    Start
</button>

<button id="stopBtn">
    Stop
</button>

<script>

let ws = null;

let audioContext = null;
let mediaStream = null;
let source = null;
let workletNode = null;

let chunkCount = 0;

let initialized = false;



function connectSocket(){

    ws = new WebSocket(
        "ws://localhost:8000/ws"
    );

    ws.binaryType = "arraybuffer";


    ws.onopen = ()=>{

        console.log(
            "Connected"
        );

    };


    ws.onmessage = (event)=>{

        console.log(
            "Transcript:",
            event.data
        );

    };


    ws.onclose = ()=>{

        console.log(
            "Disconnected"
        );

    };

}


window.onload=()=>{

    connectSocket();

};



async function initializeAudio(){

    if(initialized){

        return;

    }

    try{

        mediaStream=

        await navigator
        .mediaDevices
        .getUserMedia({

            audio:true

        });


        console.log(

            "Mic permission granted"

        );


        audioContext=

        new AudioContext({

            sampleRate:16000

        });


        console.log(

            "Sample rate:",

            audioContext.sampleRate

        );


        await audioContext
        .audioWorklet
        .addModule(

            "/audio-processor.js"

        );


        console.log(

            "Worklet loaded"

        );


        initialized=true;

        console.log(
            "Audio initialized"
        );


    }

    catch(e){

        console.log(e);

    }

}



document
.getElementById(
    "startBtn"
)
.onclick=async()=>{


try{


await initializeAudio();


chunkCount=0;


source=

audioContext
.createMediaStreamSource(

    mediaStream

);


workletNode=

new AudioWorkletNode(

    audioContext,

    "audio-processor"

);


workletNode
.port
.onmessage=(event)=>{


    let samples=

    event.data;


    let pcmData=

    new Int16Array(

        samples.length

    );


    for(

        let i=0;

        i<samples.length;

        i++

    ){

        let s=

        Math.max(

            -1,

            Math.min(

                1,

                samples[i]

            )

        );


        pcmData[i]=

        s<0

        ? s*32768
        : s*32767;

    }


    chunkCount++;


    console.log(

        "Chunk:",

        chunkCount,

        "| Samples:",

        samples.length,

        "| Bytes:",

        pcmData.byteLength

    );


    if(

        ws &&

        ws.readyState===1

    ){

        ws.send(

            pcmData.buffer

        );

    }

};


source.connect(

    workletNode

);


workletNode.connect(

    audioContext.destination

);


}

catch(e){

console.log(e);

}

};



document
.getElementById(
    "stopBtn"
)
.onclick=async()=>{


console.log(
    "Stopping..."
);


if(workletNode){

    workletNode.disconnect();

}


if(source){

    source.disconnect();

}


chunkCount=0;


/*
wait for final chunks
*/

setTimeout(()=>{


if(

    ws &&

    ws.readyState===1

){

console.log(
    "Closing websocket..."
);

ws.close();

}


/*
prepare new websocket
for next recording
*/

setTimeout(()=>{

connectSocket();

},300);


},500);


};


</script>

</body>

</html>
